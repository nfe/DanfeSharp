name: Docs
type: Docs
description: Producao ou atualizacao de documentacao (README, runbook, ADR, guia, wiki). Use quando o entregavel principal e texto, nao codigo.
title: "<verbo + objeto + qualificador>"
labels: []
body:
  - type: markdown
    attributes:
      value: |
        > Template placeholder publicado por `nfe:create-issue` (bootstrap). Sera substituido
        > pelo canonico de `nfe/.github/.github/ISSUE_TEMPLATE/docs.yml` no proximo sync
        > do provisioner em `nfe/.github#20`.
  - type: textarea
    id: origem
    attributes:
      label: Origem
      placeholder: "> Origem: @fulano via Slack #canal-x — https://..."
    validations:
      required: true
  - type: textarea
    id: contexto
    attributes:
      label: Contexto
      description: "Que duvida ou problema motivou a documentacao? Quem esta tentando resolver isso hoje?"
    validations:
      required: true
  - type: textarea
    id: audiencia
    attributes:
      label: Audiencia
      description: "Quem vai ler. Ex: novo eng do time X, oncall, time de dados externo."
    validations:
      required: true
  - type: dropdown
    id: formato
    attributes:
      label: Formato final
      options:
        - "README"
        - "Runbook"
        - "ADR"
        - "Wiki / portal"
        - "Inline (codigo)"
        - "Outro"
    validations:
      required: true
  - type: textarea
    id: objetivo
    attributes:
      label: Objetivo
      description: "Apos ler, o leitor consegue fazer o que? (1 frase)"
    validations:
      required: true
  - type: textarea
    id: criterios-aceitacao
    attributes:
      label: Criterios de aceitacao
      description: "O que conta como pronto. Inclua revisor."
    validations:
      required: true
  - type: textarea
    id: dependencias
    attributes:
      label: Dependencias
      value: "Nenhuma"
    validations:
      required: true
  - type: textarea
    id: referencias
    attributes:
      label: Referencias
      description: "Material existente sobre o tema. Minimo 1."
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Critical
        - High
        - Medium
        - Low
    validations:
      required: true
  - type: dropdown
    id: compliance
    attributes:
      label: Compliance
      options:
        - "Nao"
        - "Vigente"
        - "<90d"
        - ">90d"
    validations:
      required: true
